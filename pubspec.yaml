name: kivo
description: KIVO – High-efficiency compressor for videos, images, and PDFs.
publish_to: "none"
version: 2.2.0+6

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.10
  path_provider: ^2.1.2
  mime: ^2.0.0
  printing: ^5.12.0
  pdf: ^3.10.8
  image: ^4.1.3
  ffmpeg_kit_flutter_new: ^4.1.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/images/logo.png
  android: true
  ios: true
  adaptive_icon_background: "#1C1C1E"
  adaptive_icon_foreground: assets/images/logo.png
  macos:
    generate: true
    image_path: assets/images/logo.png
  windows:
    generate: true
    image_path: assets/images/logo.png
  linux:
    generate: true
    image_path: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/bin/macos/ffmpeg
    - assets/bin/windows/ffmpeg.exe
    - assets/bin/linux/ffmpeg
