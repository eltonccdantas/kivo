name: kivo
description: KIVO – High-efficiency compressor for videos, images, and PDFs.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.10
  path_provider: ^2.1.2
  mime: ^2.0.0
  printing: ^5.12.0
  pdf: ^3.10.8
  image: ^4.1.3
  permission_handler: ^12.0.1
  ffmpeg_kit_flutter_new: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bin/macos/ffmpeg
    - assets/bin/windows/ffmpeg.exe
    - assets/bin/linux/ffmpeg
